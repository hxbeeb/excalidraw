apiVersion: apps/v1
kind: Deployment

metadata:
  name: excalidraw

spec:
  # The WebSocket server keeps connection state in memory, so this combined
  # container must run as a single replica until shared state is introduced.
  replicas: 1

  selector:
    matchLabels:
      app: excalidraw

  template:
    metadata:
      labels:
        app: excalidraw

    spec:
      containers:
      - name: excalidraw

        image: hxbeeb/excalidraw:latest

        imagePullPolicy: Always

        ports:
        - name: frontend
          containerPort: 3002
        - name: http-api
          containerPort: 3000
        - name: websocket
          containerPort: 8080

        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: excalidraw-db
              key: DATABASE_URL
